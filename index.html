<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Minimal Platformer</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html,body { height:100%; margin:0; background:#222; display:flex; align-items:center; justify-content:center; }
  canvas { image-rendering:pixelated; border:4px solid #111; background:#78c0ff; }
  .ui { position:fixed; top:8px; left:8px; color:#fff; font-family:monospace; }
</style>
</head>
<body>
<canvas id="game" width="960" height="540"></canvas>
<div class="ui">Arrows / WASD to move — Space to jump — F1 toggles debug</div>

<script>
// ---- Config ----
const TILE = 32;
const GRAVITY = 2400; // base px/s^2
const MOVE_ACCEL = 2200; // px/s^2
const MAX_MOVE_SPEED = 240; // px/s
const FRICTION = 1400;
const JUMP_SPEED = 700; // px/s
const COYOTE_TIME = 0.08; // seconds you can still jump after leaving edge
const JUMP_BUFFER = 0.08; // seconds jump input stored before landing

// Jump feel tuning (variable gravity)
const FALL_GRAVITY_MULT = 2.2;
const LOW_JUMP_MULT = 2.8;
const APEX_GRAVITY_MULT = 0.7;
const APEX_VY_THRESHOLD = 90;
const MAX_FALL_SPEED = 1200;

// Physics substep
const MAX_SUBSTEP = 1 / 120;

// ---- Level (strings: '.' empty, '#' solid) ----
const level = [
  "........................................................",
  "........................................................",
  "........................................................",
  "..............###.......................................",
  "........................................................",
  ".........##.............................................",
  "........................................................",
  ".........................####...........................",
  "........................................................",
  "..............##........................................",
  "........................................................",
  "############################......###########...........",
  "........................................................",
  "........................................................",
  "........................................................",
  "........................................................",
];

// ---- Canvas & Camera ----
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let camera = { x:0, y:0, w: canvas.width, h: canvas.height };

// ---- Utility ----
function now() { return performance.now() / 1000; }

// ---- Input (use event.code for consistency) ----
const keys = {};            // current held state by code, e.g. "Space", "KeyA"
const downThisFrame = {};   // one-shot down flags keyed by code
let DEBUG = false;

window.addEventListener('keydown', e => {
  const code = e.code;
  if (!keys[code]) downThisFrame[code] = true;
  keys[code] = true;
  if (code === 'Space') e.preventDefault(); // prevent page scroll
  if (code === 'F1') { DEBUG = !DEBUG; e.preventDefault(); }
});
window.addEventListener('keyup', e => {
  keys[e.code] = false;
});

// ---- Tile map helpers ----
const mapW = level[0].length;
const mapH = level.length;

function tileAt(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= mapW || ty >= mapH) return '#';
  return level[ty][tx];
}
function worldToTile(x){ return Math.floor(x / TILE); }

// ---- Player ----
const player = {
  x: 80, y: 80, w: 24, h: 30,
  vx: 0, vy: 0,
  onGround: false,
  lastGroundTime: -1e9,
  lastJumpPressTime: -1e9,
};

// ---- Collision & movement ----
function moveAndCollide(entity, dt) {
  // Horizontal
  entity.x += entity.vx * dt;
  const leftTile = worldToTile(entity.x);
  const rightTile = worldToTile(entity.x + entity.w - 1);
  const topTile = worldToTile(entity.y);
  const bottomTile = worldToTile(entity.y + entity.h - 1);

  for (let ty = topTile; ty <= bottomTile; ty++) {
    if (entity.vx > 0) {
      if (tileAt(rightTile, ty) === '#') {
        entity.x = rightTile * TILE - entity.w;
        entity.vx = 0;
        break;
      }
    } else if (entity.vx < 0) {
      if (tileAt(leftTile, ty) === '#') {
        entity.x = (leftTile + 1) * TILE;
        entity.vx = 0;
        break;
      }
    }
  }

  // Vertical
  entity.y += entity.vy * dt;
  const leftTileV = worldToTile(entity.x);
  const rightTileV = worldToTile(entity.x + entity.w - 1);
  const topTileV = worldToTile(entity.y);
  const bottomTileV = worldToTile(entity.y + entity.h - 1);

  let collidedVert = false;
  for (let tx = leftTileV; tx <= rightTileV; tx++) {
    if (entity.vy > 0) {
      if (tileAt(tx, bottomTileV) === '#') {
        entity.y = bottomTileV * TILE - entity.h;
        entity.vy = 0;
        entity.onGround = true;
        entity.lastGroundTime = now();
        collidedVert = true;
        break;
      }
    } else if (entity.vy < 0) {
      if (tileAt(tx, topTileV) === '#') {
        entity.y = (topTileV + 1) * TILE;
        entity.vy = 0;
        collidedVert = true;
        break;
      }
    }
  }
  if (!collidedVert) entity.onGround = false;
}

// ---- Single physics update for a substep ----
function physicsUpdate(dt, input) {
  const left = input.left;
  const right = input.right;
  const jumpHeld = input.jumpHeld;

  // Horizontal
  if (left && !right) player.vx -= MOVE_ACCEL * dt;
  else if (right && !left) player.vx += MOVE_ACCEL * dt;
  else {
    if (player.vx > 0) player.vx = Math.max(0, player.vx - FRICTION * dt);
    else if (player.vx < 0) player.vx = Math.min(0, player.vx + FRICTION * dt);
  }
  player.vx = Math.max(-MAX_MOVE_SPEED, Math.min(MAX_MOVE_SPEED, player.vx));

  // Variable gravity
  let gravityThisFrame = GRAVITY;
  if (player.vy > 0) gravityThisFrame *= FALL_GRAVITY_MULT;
  else if (player.vy < 0 && !jumpHeld) gravityThisFrame *= LOW_JUMP_MULT;
  else if (Math.abs(player.vy) < APEX_VY_THRESHOLD && !player.onGround) gravityThisFrame *= APEX_GRAVITY_MULT;

  player.vy += gravityThisFrame * dt;
  if (player.vy > MAX_FALL_SPEED) player.vy = MAX_FALL_SPEED;

  // Jumping: record buffer handled in main loop; check here
  const canJump = (player.onGround || (now() - player.lastGroundTime) <= COYOTE_TIME);
  const bufferedJump = (now() - player.lastJumpPressTime) <= JUMP_BUFFER;
  if (bufferedJump && canJump) {
    player.vy = -JUMP_SPEED;
    player.onGround = false;
    player.lastJumpPressTime = -1e9;
  }

  moveAndCollide(player, dt);
}

// ---- Game loop ----
let last = now();
function step() {
  const t = now();
  let dt = t - last;
  last = t;
  dt = Math.min(0.1, dt);

  // Input snapshot using event.code keys
  const input = {
    left: keys['ArrowLeft'] || keys['KeyA'],
    right: keys['ArrowRight'] || keys['KeyD'],
    jumpHeld: keys['Space'] || keys['KeyW'] || keys['ArrowUp']
  };

  // Record jump presses on down transition
  if (downThisFrame['Space'] || downThisFrame['KeyW'] || downThisFrame['ArrowUp']) {
    player.lastJumpPressTime = now();
  }

  // clear downThisFrame entries
  for (const k in downThisFrame) delete downThisFrame[k];

  // Integrate in substeps
  let remaining = dt;
  while (remaining > 0) {
    const stepDt = Math.min(remaining, MAX_SUBSTEP);
    physicsUpdate(stepDt, input);
    remaining -= stepDt;
  }

  // Camera follow
  camera.x = player.x + player.w/2 - camera.w/2;
  camera.y = player.y + player.h/2 - camera.h/2 - 40;
  camera.x = Math.max(0, Math.min(camera.x, mapW * TILE - camera.w));
  camera.y = Math.max(0, Math.min(camera.y, mapH * TILE - camera.h));

  render();
  requestAnimationFrame(step);
}

// ---- Rendering ----
function render() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const startCol = Math.floor(camera.x / TILE);
  const endCol = Math.floor((camera.x + camera.w) / TILE);
  const startRow = Math.floor(camera.y / TILE);
  const endRow = Math.floor((camera.y + camera.h) / TILE);

  for (let row = startRow; row <= endRow; row++) {
    for (let col = startCol; col <= endCol; col++) {
      const ch = tileAt(col, row);
      if (ch === '#') {
        const sx = col * TILE - camera.x;
        const sy = row * TILE - camera.y;
        ctx.fillStyle = '#6b6b6b';
        ctx.fillRect(Math.round(sx), Math.round(sy), TILE, TILE);
        ctx.fillStyle = '#7f7f7f';
        ctx.fillRect(Math.round(sx)+2, Math.round(sy)+2, TILE-4, TILE-4);
      }
    }
  }

  // Draw player
  const px = player.x - camera.x;
  const py = player.y - camera.y;
  ctx.fillStyle = '#ffdd57';
  ctx.fillRect(Math.round(px), Math.round(py), player.w, player.h);
  ctx.fillStyle = '#111';
  ctx.fillRect(Math.round(px + 6), Math.round(py + 8), 4, 4);
  ctx.fillRect(Math.round(px + 14), Math.round(py + 8), 4, 4);

  // Debug overlay
  if (DEBUG) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(8, 8, 240, 88);
    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.fillText('onGround: ' + player.onGround, 16, 26);
    ctx.fillText('vy: ' + player.vy.toFixed(1), 16, 44);
    ctx.fillText('vx: ' + player.vx.toFixed(1), 16, 62);
    ctx.fillText('time since ground: ' + (now() - player.lastGroundTime).toFixed(3), 16, 80);
    ctx.fillText('buffered: ' + ((now() - player.lastJumpPressTime) <= JUMP_BUFFER), 16, 98);
  }
}

// ---- Start ----
requestAnimationFrame(step);
</script>
</body>
</html>
